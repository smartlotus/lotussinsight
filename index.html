<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insight</title>
    <style>
        :root {
            --primary-bg: #EAE6DF;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--primary-bg);
            /* 阻止移动端默认的滑动刷新等手势，优化交互体验 */
            touch-action: none; 
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            outline: none;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // === 1. 基础场景设置 ===
        const canvas = document.getElementById('canvas');
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(new THREE.Color('#EAE6DF'), 1.0); // 确立背景色

        const scene = new THREE.Scene();
        // 调整相机距离，确保能看到完整的几何体
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 25; 

        // === 2. 核心着色器 GLSL (保持不变) ===
        const vertexShaderCode = `
            uniform float uTime;
            attribute float aScale;
            
            varying vec3 vColor;
            varying float vNoise;

            // 3D 噪声函数
            vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
            vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
            float snoise(vec3 v){ 
                const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
                const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy) );
                vec3 x0 = v - i + dot(i, C.xxx) ;
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min( g.xyz, l.zxy );
                vec3 i2 = max( g.xyz, l.zxy );
                vec3 x1 = x0 - i1 + vec3(C.xxx);
                vec3 x2 = x0 - i2 + vec3(C.yyy);
                vec3 x3 = x0 - D.yyy;
                i = mod(i, 289.0 ); 
                vec4 p = permute( permute( permute( i.z + vec4(0.0, i1.z, i2.z, 1.0 )) + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
                float n_ = 1.0/7.0; 
                vec3  ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z *ns.z);  
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_ );    
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4( x.xy, y.xy );
                vec4 b1 = vec4( x.zw, y.zw );
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
                vec3 p0 = vec3(a0.xy,h.x);
                vec3 p1 = vec3(a0.zw,h.y);
                vec3 p2 = vec3(a1.xy,h.z);
                vec3 p3 = vec3(a1.zw,h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
                p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
            }

            void main() {
                // 计算形变
                float noiseFreq = 0.4;
                float noiseAmp = 1.5;
                vec3 noisePos = vec3(position.x * noiseFreq + uTime * 0.2, position.y * noiseFreq + uTime * 0.3, position.z * noiseFreq);
                float noise = snoise(noisePos) * noiseAmp;
                vNoise = noise;
                
                // 核心形状：顺着法线方向形变
                vec3 newPosition = position + normalize(position) * noise;

                vec4 mvPosition = modelViewMatrix * vec4(newPosition, 1.0);
                gl_Position = projectionMatrix * mvPosition;

                // 粒子大小：调整到非常精细的状态，越远越小
                gl_PointSize = (30.0 * aScale) / -mvPosition.z;
            }
        `;

        const fragmentShaderCode = `
            uniform vec3 uColor1;
            uniform vec3 uColor2;
            
            varying float vNoise;

            void main() {
                // 绘制清晰的圆形粒子，丢弃边缘
                float dist = distance(gl_PointCoord, vec2(0.5));
                if (dist > 0.5) discard;
                
                // 柔和边缘，去除锯齿
                float alpha = smoothstep(0.5, 0.4, dist) * 0.85; 

                // 颜色基于噪波形变程度进行插值（红蓝过渡）
                float colorMix = smoothstep(-1.0, 1.0, vNoise);
                vec3 finalColor = mix(uColor1, uColor2, colorMix);

                gl_FragColor = vec4(finalColor, alpha);
            }
        `;

        // === 3. 几何体与材质生成 (保持不变) ===
        function createParticles() {
            const particleGroup = new THREE.Group();

            function generateLayer(count, radius, color1, color2) {
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                const scales = new Float32Array(count);

                const phi = Math.PI * (3 - Math.sqrt(5)); 
                
                for (let i = 0; i < count; i++) {
                    const y = 1 - (i / (count - 1)) * 2;
                    const r = Math.sqrt(1 - y * y);
                    const theta = phi * i;

                    positions[i * 3] = Math.cos(theta) * r * radius;
                    positions[i * 3 + 1] = y * radius;
                    positions[i * 3 + 2] = Math.sin(theta) * r * radius;

                    scales[i] = Math.random() * 0.5 + 0.1; 
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('aScale', new THREE.BufferAttribute(scales, 1));

                const material = new THREE.ShaderMaterial({
                    vertexShader: vertexShaderCode,
                    fragmentShader: fragmentShaderCode,
                    uniforms: {
                        uTime: { value: 0 },
                        uColor1: { value: new THREE.Color(color1) }, 
                        uColor2: { value: new THREE.Color(color2) }  
                    },
                    transparent: true,
                    blending: THREE.NormalBlending, 
                    depthWrite: false,
                });

                return new THREE.Points(geometry, material);
            }

            const core = generateLayer(25000, 3.5, '#d63411', '#0b79ba');
            const outer = generateLayer(15000, 6.0, '#115ed6', '#d64211');

            particleGroup.add(core);
            particleGroup.add(outer);
            
            particleGroup.rotation.z = Math.PI / 5;
            particleGroup.rotation.x = Math.PI / 6;

            return particleGroup;
        }

        const universe = createParticles();
        scene.add(universe);

        // === 4. 添加 3D 交互控制 (OrbitControls) ===
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // 开启阻尼效果，让滑动更有惯性和顺滑感
        controls.dampingFactor = 0.05;
        controls.enableZoom = true;    // 允许缩放
        controls.enablePan = true;     // 允许平移

        // 窗口尺寸自适应
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();

        // === 5. 动画循环 ===
        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // 更新流体的时间变量
            universe.children.forEach(layer => {
                layer.material.uniforms.uTime.value = elapsedTime;
            });

            // 整个粒子群组缓慢自转保持动态感
            universe.rotation.y = elapsedTime * 0.08;

            // 更新控制器（阻尼效果必须在动画循环中调用 update）
            controls.update();

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
